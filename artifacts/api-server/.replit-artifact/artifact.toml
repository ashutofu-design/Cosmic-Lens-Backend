kind = "api"
previewPath = "/api"
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api", "/legal", "/privacy", "/terms", "/refund", "/refund-policy", "/disclaimer"]

[services.development]
run = "bash start.sh"

[services.development.env]
PORT = "8080"

[services.production]
build = "pip install -r artifacts/api-server/requirements.txt"

[services.production.run]
args = [
  "gunicorn",
  "--chdir", "artifacts/api-server",
  "--bind", "0.0.0.0:8080",
  "--workers", "2",
  "--threads", "4",
  "--timeout", "60",
  "--access-logfile", "-",
  "flask_app:app",
]

[services.production.run.env]
PORT = "8080"

[services.production.health.startup]
path = "/api/healthz"
