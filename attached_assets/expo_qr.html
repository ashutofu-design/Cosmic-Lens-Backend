<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Cosmic Lens – Expo QR</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    body { background:#0c0818; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; margin:0; font-family:sans-serif; color:#f0e6ff; }
    h2 { margin-bottom:6px; font-size:20px; }
    p { color:#7c6fa0; font-size:13px; margin-bottom:20px; }
    #qr { background:#fff; padding:16px; border-radius:12px; }
    code { background:#120e22; border:1px solid rgba(139,92,246,0.22); padding:8px 14px; border-radius:8px; font-size:13px; color:#b39ddb; margin-top:18px; display:block; word-break:break-all; text-align:center; max-width:340px; }
  </style>
</head>
<body>
  <h2>🔭 Cosmic Lens</h2>
  <p>Expo Go se scan karo</p>
  <div id="qr"></div>
  <code>exp://x7gw7ku-anonymous-18987.exp.direct</code>
  <script>
    new QRCode(document.getElementById("qr"), {
      text: "exp://x7gw7ku-anonymous-18987.exp.direct",
      width: 260, height: 260,
      colorDark: "#1a0a2e", colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.M
    });
  </script>
</body>
</html>
